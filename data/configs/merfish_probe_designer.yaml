#######################
### USER PARAMETERS ###
#######################

schema_version: 2

general:
  n_jobs: 4 # number of cores used to run the pipeline and 2*n_jobs +1 of regions that should be stored in cache. If memory consumption of pipeline is too high reduce this number, if a lot of RAM is available increase this number to decrease runtime
  dir_output: output_merfish_probe_designer # name of the directory where the output files will be written
  write_intermediate_steps: true # if true, writes the oligo sequences after each step of the pipeline into a csv file
  top_n_sets: 3 #maximum number of sets to report in padlock_probes.yaml and "padlock_probes_order.yaml"

target_probe:
  file_regions: data/genes/custom_3.txt # file with a list the genes used to generate the probe sequences, leave empty if all the genes are used
  files_fasta_database: # fasta file with sequences form which the probes should be generated. Hint: use the genomic_region_generator pipeline to create fasta files of genomic regions of interest
    - data/genomic_regions/exon_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
    - data/genomic_regions/exon_exon_junction_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
  files_fasta_reference_database: # fasta file with sequences used as reference for the specificity filters. Hint: use the genomic_region_generator pipeline to create fasta files of genomic regions of interest
    - data/genomic_regions/exon_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
    - data/genomic_regions/exon_exon_junction_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
  length_min: 30 #min length of probe
  length_max: 30 #max length of probe
  isoform_consensus: 50 #min isoform consesnsus for probes, i.e. how many transcripts of the total number of transcripts of a gene are covered by the probe, given in %
  GC_content_min: 43 # minimum GC content of oligos
  GC_content_opt: 55 # max and min values are defiend above
  GC_content_max: 63 # maximum GC content of oligos
  Tm_min: 66 # minimum melting temperature of oligos
  Tm_opt: 72 # max and min values are defiend above
  Tm_max: 76 # maximum melting temperature of oligos
  homopolymeric_base_n: # minimum number of nucleotides to consider it a homopolymeric run per base
    A: 6
    T: 6
    C: 6
    G: 6
  T_secondary_structure: 76 # Temperature at which the free energy is calculated
  GC_weight: 1 # weight of the GC content of the probe in the efficiency score
  Tm_weight: 1 # weight of the Tm of the probe in the efficiency score
  isoform_weight: 2 # weight of the isoform consensus of the probe in the efficiency score
  set_size_min: 50 # minimum size of probe sets (in case there exist no set of the optimal size) -> genes with less oligos will be filtered out and stored in regions_with_insufficient_oligos_for_db_probes
  set_size_opt: 50 # optimal size of probe sets
  distance_between_target_probes: 0 # how much overlap should be allowed between oligos, e.g. if oligos can overlpap x bases choose -x, if oligos can be next to one another choose 0, if oligos should be x bases apart choose x
  n_sets: 100 # maximum number of sets to generate

readout_probe:
  files_fasta_reference_database: # fasta file with sequences used as reference for the specificity filters. Hint: use the genomic_region_generator pipeline to create fasta files of genomic regions of interest
    - data/genomic_regions/exon_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
    - data/genomic_regions/exon_exon_junction_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
  length: 20 # length of readout probes
  base_probabilities: # probabilities of each base for random readout probe sequence generation
    A: 0.25
    C: 0.00
    G: 0.50
    T: 0.25
  GC_content_min: 40 # minimum GC content of oligos
  GC_content_max: 50 # maximum GC content of oligos
  homopolymeric_base_n: # minimum number of nucleotides to consider it a homopolymeric run per base
    G: 3
  set_size: 16 # total number of readout probes
  homogeneous_properties_weights: # readout probes in one set should have similar properties, the weighted sum of variance of the properties is minimized
    TmNN_oligo: 1.0 # melting temperature
    GC_content_oligo: 1.0 # GC content
  n_bits: 16 # number of bits contained in each barcode
  min_hamming_dist: 4 # minimum distance between two valid barcodes
  hamming_weight: 2 # number of bits containing one in each barcode
  channels_ids: # names of fluorescent channels
    - Alexa488
    - Cy3b
    - Alexa647

primer:
  files_fasta_reference_database: # fasta file with sequences used as reference for the specificity filters. Hint: use the genomic_region_generator pipeline to create fasta files of genomic regions of interest
    - data/genomic_regions/exon_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
    - data/genomic_regions/exon_exon_junction_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
  reverse_primer_sequence: CCCTATAGTGAGTCGTATTA # defaults to reverse complement of 20 nt T7 promoter sequence, change if different sequence desired
  length: 20 # length of forward primer
  base_probabilities: # probabilities of each base for random primer sequence generation
    A: 0.25
    C: 0.25
    G: 0.25
    T: 0.25
  GC_content_min: 50 # minimum GC content of oligos
  GC_content_max: 65 # maximum GC content of oligos
  number_GC_GCclamp: 1 # the minimum number of G or C nucleotides required within the specified number of bases
  number_three_prime_base_GCclamp: 2 # the number of bases to consider from the 3' end of the sequence
  homopolymeric_base_n: # minimum number of nucleotides to consider it a homopolymeric run per base
    A: 4
    T: 4
    C: 4
    G: 4
  max_len_selfcomplement: 6
  max_len_complement_reverse_primer: 5
  Tm_min: 60
  Tm_max: 75
  T_secondary_structure: 76 # Temperature at which the free energy is calculated
  secondary_structures_threshold_deltaG: 0 # threshold for the secondary structure free energy -> oligo rejected if it presents a structure with a negative free energy at the defined temperature


############################
### DEVELOPER PARAMETERS ###
############################

developer_param:
  target_probe:
  # Parameters for property filters
  # The melting temperature is used in 2 different stages (property filters and padlock detection probe design), where a few parameters are shared and the others differ.
  # parameters for melting temperature -> for more information on parameters, see: https://biopython.org/docs/1.75/api/Bio.SeqUtils.MeltingTemp.html#Bio.SeqUtils.MeltingTemp.Tm_NN
    Tm_parameters:
      mode: custom
      parameters:
        nn_table: DNA_NN4 # SantaLucia (2004) taken from Moffitt (2016)
        tmm_table: DNA_TMM1 #default
        imm_table: DNA_IMM1 #default
        de_table: DNA_DE1 #default
        dnac1: 5 #[nM] taken from Moffitt (2016)
        dnac2: 0 #[nM] taken from Moffitt (2016)
        saltcorr: 5 # correction for deltaS, taken from https://github.com/ZhuangLab/MERFISH_analysis
        Na: 300 #[mM] 0.3M, taken from https://github.com/ZhuangLab/MERFISH_analysis
        K: 0 #[mM] default
        Tris: 0 #[mM] default
        Mg: 0 #[mM] default
        dNTPs: 0 #[mM] default
    Tm_chem_correction_parameters:
      mode: disabled
    Tm_salt_correction_parameters:
      mode: disabled
    secondary_structures_threshold_deltaG: 0 # threshold for the secondary structure free energy -> oligo rejected if it presents a structure with a negative free energy at the defined temperature
    # Specificity filter with BlastN
    specificity_blastn_search_parameters:
      -perc_identity: 80
      -strand: "minus" # this parameter is fixed, if reference is whole genome, consider using "both"
      -word_size: 10
      -dust: "no"
      -soft_masking: "false"
      -max_target_seqs: 10
      -max_hsps: 1000
    specificity_blastn_hit_parameters:
      min_alignment_length: 17 # can be turned into coverage
    # Crosshybridization filter with BlastN
    cross_hybridization_blastn_search_parameters:
      -perc_identity: 80
      -strand: "minus" # this parameter is fixed
      -word_size: 7
      -dust: "no"
      -soft_masking: "false"
      -max_target_seqs: 10
    cross_hybridization_blastn_hit_parameters:
      min_alignment_length: 17 # can be turned into coverage
  oligo_set_selection:
    # Parameters for the oligo set selection
    max_graph_size: 5000 # maximum number of oligos that are taken into consisderation in the last step (5000 -> ~5GB, 2500 -> ~1GB)
    n_attempts: 100000 # number of attempts to find the optimal set of oligos
    heuristic: true # apply heuristic pre-search to reduce search space and runtime of oligo set selection
    heuristic_n_attempts: 100 # number of attempts to find the optimal set of oligos for heuristic pre-search
  readout_probe:
    initial_num_sequences: 100000 # if not enough readout probes can be generated, increase this number
    # Parameters for property filters
    Tm_parameters:
      mode: custom
      parameters:
        nn_table: DNA_NN4 #S antaLucia (2004) taken from Moffitt (2016)
        tmm_table: DNA_TMM1 #default
        imm_table: DNA_IMM1 #default
        de_table: DNA_DE1 #default
        dnac1: 25 #default
        dnac2: 25 #default
        saltcorr: 5 # correction for deltaS, taken from https://github.com/ZhuangLab/MERFISH_analysis
        Na: 300 #[mM] 0.3M, taken from https://github.com/ZhuangLab/MERFISH_analysis
        K: 0 #[mM] default
        Tris: 0 #[mM] default
        Mg: 0 #[mM] default
        dNTPs: 0 #[mM] default
    Tm_chem_correction_parameters:
      mode: disabled
    Tm_salt_correction_parameters:
      mode: disabled
    # Specificity filter with BlastN
    specificity_blastn_search_parameters:
      -perc_identity: 100
      -strand: "minus" # this parameter is fixed, if reference is whole genome, consider using "both"
      -word_size: 7
      -dust: "no"
      -soft_masking: "false"
      -max_target_seqs: 10
      -max_hsps: 1000
    specificity_blastn_hit_parameters:
      min_alignment_length: 11 # can be turned into coverage
    # Crosshybridization filter with BlastN
    cross_hybridization_blastn_search_parameters:
      -perc_identity: 100
      -strand: "minus" # this parameter is fixed
      -word_size: 7
      -dust: "no"
      -soft_masking: "false"
      -max_target_seqs: 10
    cross_hybridization_blastn_hit_parameters:
      min_alignment_length: 11 # can be turned into coverage
    # Parameters for the oligo set selection
    n_combinations: 100000 # number of random combinations of readout probe sets to iterate through
  primer:
    initial_num_sequences: 1000000 # if no primer can be generated, increase this number
    # Parameters for property filters
    # The melting temperature is used in 2 different stages (property filters and padlock detection probe design), where a few parameters are shared and the others differ.
    # parameters for melting temperature -> for more information on parameters, see: https://biopython.org/docs/1.75/api/Bio.SeqUtils.MeltingTemp.html#Bio.SeqUtils.MeltingTemp.Tm_NN
    Tm_parameters:
      mode: custom
      parameters:
        nn_table: DNA_NN4 #S antaLucia (2004) taken from Moffitt (2016)
        tmm_table: DNA_TMM1 #default
        imm_table: DNA_IMM1 #default
        de_table: DNA_DE1 #default
        dnac1: 250 #[nM] taken from https://github.com/ZhuangLab/MERFISH_analysis
        dnac2: 250 #[nM] taken from https://github.com/ZhuangLab/MERFISH_analysis
        saltcorr: 5 # correction for deltaS, taken from https://github.com/ZhuangLab/MERFISH_analysis
        Na: 300 #[mM] 0.3M, taken from https://github.com/ZhuangLab/MERFISH_analysis
        K: 0 #[mM] default
        Tris: 0 #[mM] default
        Mg: 0 #[mM] default
        dNTPs: 0 #[mM] default
    Tm_chem_correction_parameters:
      mode: disabled
    Tm_salt_correction_parameters:
      mode: disabled
    # Specificity filter with BlastN against reference
    specificity_reference_blastn_search_parameters:
      -perc_identity: 100
      -strand: "minus" # this parameter is fixed, if reference is whole genome, consider using "both"
      -word_size: 7
      -dust: "no"
      -soft_masking: "false"
      -max_target_seqs: 10
      -max_hsps: 1000
    specificity_reference_blastn_hit_parameters:
      min_alignment_length: 14 # can be turned into coverage
    # Specificity filter with BlastN against hybridization rpobes
    specificity_hybridization_probes_blastn_search_parameters:
      -perc_identity: 100
      -strand: "minus" # this parameter is fixed, if reference is whole genome, consider using "both"
      -word_size: 7
      -dust: "no"
      -soft_masking: "false"
      -max_target_seqs: 10
      -max_hsps: 1000
    specificity_hybridization_probes_blastn_hit_parameters:
      min_alignment_length: 11 # can be turned into coverage
