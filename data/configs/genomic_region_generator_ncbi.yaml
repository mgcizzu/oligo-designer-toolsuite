#######################
### BASIC PARAMETERS ###
#######################

### General parameters
dir_output: output_genomic_region_generator_ncbi # name of the directory where the output files will be written

### Parameters for genome and gene annotation
source: ncbi # required: indicate that ncbi annotation should be used
source_params:
  # Mode A (taxon/species based): set taxon/species/assembly_source/annotation_release
  taxon: vertebrate_mammalian # required in Mode A; supported taxa are: archaea, bacteria, fungi, invertebrate, metagenomes, plants, protozoa, unknown, vertebrate_mammalian, vertebrate_other, viral
  species: Homo_sapiens # required in Mode A; species name in NCBI download format
  assembly_source: auto # optional in Mode A: auto, annotation_releases, latest_assembly_versions, reference
  annotation_release: 110 # required in Mode A; use release number only with assembly_source=annotation_releases; otherwise set to 'current'

  # Mode B (direct assembly): set both fields below and set Mode A fields above to None
  refseq_assembly_accession: None # GCF_000001405.38
  assembly_name: None # GRCh38.p12

### Parameters for sequences generation
# List of genomic regions that should be generated, set the genomic regions you want to generate to true
genomic_regions:
  gene: false
  intergenic: false
  exon: true
  exon_exon_junction: true
  utr: false
  cds: false
  intron: false

# If exon_exon_junction is ste to true, specify the block size, i.e. +/- "block_size" bp around the junction
# Hint: it does not make sense to set the block size larger than the maximum oligo length
exon_exon_junction_block_size: 50
