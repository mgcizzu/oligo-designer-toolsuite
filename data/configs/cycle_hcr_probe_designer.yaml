#######################
### USER PARAMETERS ###
#######################

schema_version: 2

general:
  n_jobs: 2 # number of cores used to run the pipeline and 2*n_jobs +1 of regions that should be stored in cache. If memory consumption of pipeline is too high reduce this number, if a lot of RAM is available increase this number to decrease runtime
  dir_output: output_cyclehcr_probe_designer # name of the directory where the output files will be written
  write_intermediate_steps: true # if true, writes the oligo sequences after each step of the pipeline into a csv file
  top_n_sets: 3 # maximum number of sets to report in cyclehcr_probes.yaml and "cyclehcr_probes_order.yaml"

target_probe:
  file_regions: data/genes/custom_3.txt # file with a list the genes used to generate the probe sequences, leave empty if all the genes are used
  files_fasta_database: # fasta file with sequences form which the probes should be generated. Hint: use the genomic_region_generator pipeline to create fasta files of genomic regions of interest
    - data/genomic_regions/exon_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
    - data/genomic_regions/exon_exon_junction_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
  files_fasta_reference_database: # fasta file with sequences used as reference for the specificity filters. Hint: use the genomic_region_generator pipeline to create fasta files of genomic regions of interest
    - data/genomic_regions/gene_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
  isoform_consensus: 0 # min isoform consensus for probes, i.e. how many transcripts of the total number of transcripts of a gene are covered by the probe, given in %
  L_probe_sequence_length: 45 # L + spacer + R sequence should equal the total probe length, e.g. 45 + 2 + 45 = 92
  gap_sequence_length: 2 # gap between L and R probe sequences
  R_probe_sequence_length: 45 # L + spacer + R sequence should equal the total probe length, e.g. 45 + 2 + 45 = 92
  GC_content_min: 30 # minimum GC content of oligos
  GC_content_max: 90 # maximum GC content of oligos
  Tm_min: 90 # minimum melting temperature of oligos
  Tm_max: 200 # maximum melting temperature of oligos
  homopolymeric_base_n: # minimum number of nucleotides to consider it a homopolymeric run per base
    A: 6
    T: 6
    C: 6
    G: 6
  T_secondary_structure: 90 # Temperature at which the free energy is calculated
  junction_region_size: 13 # size of the seed region around the junction site for blast seed region filter; set to 0 if junction region should not be considered for blast search
  Tm_weight: 1 # weight of the Tm of the probe in the efficiency score, where score in abs(Tm_max - Tm_probe)
  isoform_weight: 10 # weight of the isoform consensus of the probe in the efficiency score, where score is between 0 and 1
  set_size_min: 10 # minimum size of probe sets (in case there exist no set of the optimal size) -> genes with less oligos will be filtered out and stored in regions_with_insufficient_oligos_for_db_probes
  set_size_opt: 25 # optimal size of probe sets
  distance_between_target_probes: 2 # how much overlap should be allowed between oligos, e.g. if oligos can overlpap x bases choose -x, if oligos can be next to one another choose 0, if oligos should be x bases apart choose x
  n_sets: 30 # maximum number of sets to generate
  linker_sequence: TT # linker sequence between readout probe and target sequence

readout_probe:
  file_readout_probe_table: data/functional_oligos/cycle_hcr_readout_probes_with_codebook.tsv # csv/tsv file containing the readout probe table with the columns "bit", "channel", "readout_probe_id", "readout_probe__sequence", "L/R"
  file_codebook: data/functional_oligos/cycle_hcr_codebook.tsv # optional, file containing the codebook, where columns = "bits" and rows = "region_id" and the entries represent the bit encoding in 0/1 for the bits used for each region

primer:
  forward_primer_sequence: TAATACGACTCACTATAGCGTCATC # defaults to T7 promoter sequence, change if different sequence desired
  reverse_primer_sequence: CGACACCGAACGTGCGACAA # defaults to oligo sequence, change if different sequence desired

############################
### DEVELOPER PARAMETERS ###
############################

developer_param:
  # Parameters for property filters
  # parameters for melting temperature -> for more information on parameters, see: https://biopython.org/docs/1.75/api/Bio.SeqUtils.MeltingTemp.html#Bio.SeqUtils.MeltingTemp.Tm_NN
  target_probe:
    Tm_parameters:
      mode: custom
      parameters:
        nn_table: DNA_NN3 # default
        tmm_table: DNA_TMM1 # default
        imm_table: DNA_IMM1 # default
        de_table: DNA_DE1 # default
        dnac1: 25 #[nM]
        dnac2: 25 #[nM]
        saltcorr: 0 #
        Na: 50 #[mM]
        K: 0 #[mM] default
        Tris: 0 #[mM] default
        Mg: 0 #[mM] default
        dNTPs: 0 #[mM] default
    Tm_chem_correction_parameters:
      mode: disabled
    Tm_salt_correction_parameters:
      mode: disabled
    secondary_structures_threshold_deltaG: 0 # threshold for the secondary structure free energy -> oligo rejected if it presents a structure with a negative free energy at the defined temperature
    # Specificity filter with BlastN
    specificity_blastn_search_parameters:
      -perc_identity: 100
      -strand: "minus" # this parameter is fixed, if reference is whole genome, consider using "both"
      -word_size: 10
      -dust: "no"
      -soft_masking: "false"
      -max_target_seqs: 10
      -max_hsps: 1000
    specificity_blastn_hit_parameters:
      coverage: 90 # can be turned into min_alignment_length
    # Crosshybridization filter with BlastN
    cross_hybridization_blastn_search_parameters:
      -perc_identity: 100
      -strand: "minus" # this parameter is fixed, if reference is whole genome, consider using "both"
      -word_size: 7
      -dust: "no"
      -soft_masking: "false"
      -max_target_seqs: 10
    cross_hybridization_blastn_hit_parameters:
      coverage: 90 # can be turned into min_alignment_length
  # Parameters for the Oligo set selection
  oligo_set_selection:
    max_graph_size: 5000 # maximum number of oligos that are taken into consisderation in the last step (5000 -> ~5GB, 2500 -> ~1GB)
    n_attempts: 100000 # number of attempts to find the optimal set of oligos
    heuristic: true # apply heuristic pre-search to reduce search space and runtime of oligo set selection
    heuristic_n_attempts: 100 # number of attempts to find the optimal set of oligos for heuristic pre-search

