#######################
### USER PARAMETERS ###
#######################

### General parameters
### -----------------------------------------------
n_jobs: 4 # Number of CPU cores for parallel execution; also controls cache size (2*n_jobs+1 regions). Reduce if memory is limited; increase for faster runs when RAM is available.
dir_output: output_oligo_seq_probe_designer # Output directory for all generated files (TSV, Excel, etc.).
write_intermediate_steps: true # If true, writes intermediate results after each pipeline step for debugging/inspection.

### Target Probe Parameters
### -----------------------------------------------
target_probe_design_parameters:
  file_region_ids: data/genes/custom_100.txt # Path to file listing gene/region IDs to design probes for. Empty = use all genes from the FASTA.
  files_fasta_probe_database: # FASTA file(s) from which oligo sequences are generated. Use genomic_region_generator for custom regions.
    - data/genomic_regions/exon_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
    - data/genomic_regions/exon_exon_junction_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
  probe_length_min: 26 # Minimum allowed oligo length (bases).
  probe_length_max: 30 # Maximum allowed oligo length (bases).
  probe_split_region: 4 # Minimum bases spanning the exon–exon junction (upstream and downstream) so the oligo is junction-spanning.

target_probe_isoform_consensus_filter: # Require oligos to be supported by a minimum fraction of gene transcripts.
  enabled: true # Turn this filter on or off.
  isoform_consensus: 0 # Minimum isoform consensus (%). Oligos must be covered by at least this fraction of a gene's transcripts.

target_probe_targeted_exons_filter: # Restrict design to specific exon numbers.
  enabled: false # Turn this filter on or off.
  targeted_exons: ["1", "2", "3"] # Exon numbers to target. Only oligos in these exons are kept.

target_probe_hard_masked_sequences_filter: # Exclude oligos overlapping hard-masked (e.g. N) regions in the reference.
  enabled: true # Turn this filter on or off.

target_probe_soft_masked_sequences_filter: # Exclude oligos overlapping soft-masked (lowercase) regions in the reference.
  enabled: true # Turn this filter on or off.

target_probe_homopolymeric_runs_filter: # Exclude oligos containing long homopolymeric runs (e.g. AAAAAA).
  enabled: true # Turn this filter on or off.
  homopolymeric_base_n: {"A": 6, "T": 6, "C": 6, "G": 6} # Minimum run length per base to count as homopolymeric. Oligos with longer runs are rejected.

target_probe_GC_content_filter: # Enforce GC content within a specified range.
  enabled: true # Turn this filter on or off.
  GC_content_min: 45 # Minimum GC content (%). Oligos below this are rejected.
  GC_content_max: 65 # Maximum GC content (%). Oligos above this are rejected.

target_probe_prohibited_sequences_filter: # Exclude oligos containing forbidden motifs and/or over-abundant k-mers.
  enabled: true # Turn this filter on or off.
  prohibited_sequences: ["TCT", "CTC"] # Exact sequences forbidden in oligos (e.g. restriction sites). Any oligo containing one is filtered out.
  kmer_abundance_threshold: {3: 0.0469, 4: 0.0117, 5: 0.0029, 6: 0.00073} # Max allowed k-mer abundance per length (k -> threshold). Empty = no k-mer filtering.

target_probe_self_complementarity_filter: # Limit self-complementarity to reduce homodimer formation.
  enabled: true # Turn this filter on or off.
  max_len_selfcomplement: 15 # Maximum length of self-complementary sequence allowed; longer stretches lead to rejection.

target_probe_melting_temperature_filter: # Enforce melting temperature (Tm) within a range (uses Tm parameters below).
  enabled: true # Turn this filter on or off.
  Tm_min: 50 # Minimum melting temperature (°C). Oligos below this are rejected.
  Tm_max: 70 # Maximum melting temperature (°C). Oligos above this are rejected.

target_probe_secondary_structure_filter: # Reject oligos with stable secondary structure at the given temperature.
  enabled: true # Turn this filter on or off.
  T: 37 # Temperature (°C) at which secondary structure free energy is evaluated.
  thr_DG: 0 # Free-energy threshold (kcal/mol). Oligos with ΔG ≤ thr_DG (stable structure) are rejected.

target_probe_read_length_bias_filter: # Avoid oligos whose 5' prefix matches another oligo (reduces ambiguity for short reads).
  enabled: true # Turn this filter on or off.
  read_length_bias: 20 # Length of 5' prefix (bases). The first N bases of an oligo must not match the first N bases of another oligo.

target_probe_cross_hybridization_filter: # Remove oligos that may cross-hybridize to off-target sequences (BLAST-based).
  enabled: true # Turn this filter on or off.
  cross_hybridization_search_parameters: {"-perc_identity": 80, "-strand": "minus", "-word_size": 10} # BLAST options for the cross-hybridization search.
  cross_hybridization_hit_parameters: {"coverage": 50} # Hit criteria (e.g. coverage %). Hits satisfying these lead to oligo rejection.

target_probe_specificity_blastn_filter: # Ensure oligo specificity against a reference database (BLAST-based).
  enabled: true # Turn this filter on or off.
  specificity_blastn_search_parameters: {"-perc_identity": 80, "-strand": "minus", "-word_size": 10} # BLAST options for the specificity search.
  specificity_blastn_hit_parameters: {"coverage": 50} # Hit criteria (e.g. coverage %). Hits satisfying these lead to oligo rejection.
  files_fasta_reference_database: # FASTA file(s) used as reference for specificity. Use genomic_region_generator for custom reference sets.
    - data/genomic_regions/exon_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna
    - data/genomic_regions/exon_exon_junction_annotation_source-NCBI_species-Homo_sapiens_annotation_release-110_genome_assemly-GRCh38.fna

target_probe_variant_filter: # Flag or exclude oligos overlapping variants from VCF files.
  enabled: true # Turn this filter on or off.
  files_vcf_reference_database: # VCF file(s) with reference variants. Oligos overlapping these can be flagged or removed depending on action.
    - data/annotations/custom_GCF_000001405.40.chr16.vcf
  action: "flag" # Action for variant-overlapping oligos: "flag" (mark only) or "filter" (exclude).

target_probe_set_selection_parameters: # Parameters for selecting multiple probe sets per gene (size, spacing, scoring, diversification).
  n_sets: 3 # Number of probe sets to generate per gene.
  set_size_min: 3 # Minimum set size. Genes that cannot form a set of at least this size are reported as insufficient.
  set_size_opt: 5 # Preferred (optimal) number of oligos per set.
  distance_between_target_probes: 0 # Required spacing: negative = allow overlap (bases), 0 = adjacent OK, positive = minimum gap (bases).
  uniform_distance_weight: 1 # Weight for uniform spacing in the set-selection scoring function.
  isoform_weight: 1 # Weight for isoform coverage in the set-selection scoring function.
  targeted_exons_weight: 0 # Weight for targeted-exon coverage in the set-selection scoring function.
  targeted_exons: ["1", "2", "3"] # Exon numbers to favour in set selection.
  GC_weight: 1 # Weight for GC content in the set-selection scoring function.
  GC_content_opt: 55 # Target (optimal) GC content (%) for scoring; bounds are from target_probe_GC_content_filter.
  Tm_weight: 1 # Weight for Tm in the set-selection scoring function.
  Tm_opt: 60 # Target (optimal) Tm (°C) for scoring; bounds are from target_probe_melting_temperature_filter.
  n_attempts_graph: 50 # Number of randomized graph attempts used to diversify set selection.
  n_attempts_clique_enum: 50 # Maximum cliques enumerated per graph attempt.
  diversification_fraction: 0.1 # Fraction of oligos removed from the graph in each attempt to increase set diversity.
  jaccard_opt: 0.5 # Target maximum Jaccard similarity between selected sets; lower = more distinct sets.
  jaccard_step: 0.1 # Step size for relaxing Jaccard threshold when too few sets are found.


############################
### DEVELOPER PARAMETERS ###
############################

### Target Probe Tm Parameters
### -----------------------------------------------
target_probe_Tm_parameters: # Tm used in property filters and probe design. Passed to Biopython Tm_NN (see Biopython docs).
  nn_table: DNA_NN3 # Nearest-neighbour enthalpy/entropy table.
  tmm_table: DNA_TMM1 # Terminal mismatch table.
  imm_table: DNA_IMM1 # Internal mismatch table.
  de_table: DNA_DE1 # Dangling-end table.
  dnac1: 50 # Concentration of the first oligonucleotide [nM].
  dnac2: 0 # Concentration of the second oligonucleotide [nM]; 0 for unimolecular.
  saltcorr: 7 # Salt correction method (integer code for Biopython).
  Na: 1000 # Sodium ion concentration [mM]. Example: 1000 = 1 M (e.g. from probeArray conditions).
  K: 0 # Potassium ion concentration [mM].
  Tris: 0 # Tris concentration [mM].
  Mg: 0 # Magnesium ion concentration [mM].
  dNTPs: 0 # dNTP concentration [mM].

target_probe_Tm_chem_correction_parameters: # Optional chemical correction for Tm (e.g. DMSO, formamide).
  DMSO: 0 # DMSO concentration (%). 0 = no DMSO correction.
  DMSOfactor: 0.75 # Factor for DMSO effect on Tm.
  fmd: 20 # Formamide concentration (%). 0 = no formamide correction.
  fmdfactor: 0.65 # Factor for formamide effect on Tm.
  fmdmethod: 1 # Formamide correction method (integer code).
  GC: null # Optional GC correction; null = use default.

target_probe_Tm_salt_correction_parameters: null # Optional custom salt correction for Tm. Set to a dict to override; null = use default.
